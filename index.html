<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shapeshifter</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #000; }
        #map { height: 100vh; width: 100vw; }
        
        /* Control Panel Styles */
        #control-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 360px;
        }
        
        .panel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .panel-section { margin-bottom: 15px; }
        .panel-heading { font-weight: bold; margin-bottom: 8px; display: block; font-size: 16px; }
        
        /* Search Bar */
        .search-container { display: flex; gap: 5px; }
        #search-input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px; 
        }
        
        /* Buttons */
        button {
            padding: 12px 18px;
            background: #2a75d3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 17px;
            transition: background 0.2s;
        }
        button:hover { background: #1b5baf; }
        
        .btn-action { background: #ff2a00; }
        .btn-action:hover { background: #cc2200; }
        .btn-full { width: 100%; padding: 14px; margin-top: 5px; font-size: 18px; }
        .btn-import { background: #444; }
        .btn-import:hover { background: #222; }
        
        /* Save Form Styles */
        #shape-name {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 1px solid #aaa;
            border-radius: 6px;
        }

        /* Saved Shapes List */
        #saved-list {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 15px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        .saved-item {
            display: flex;
            flex-direction: column;
            background: #f4f4f4;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
        }
        .saved-item-header {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 10px;
        }
        
        /* Individual Shape Controls */
        .shape-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 6px;
        }
        .export-controls {
            display: flex;
            gap: 6px;
        }
        
        .shape-controls button, .export-controls button {
            padding: 10px;
            font-size: 14px;
        }
        
        /* Button Sizing & Coloring */
        .btn-teleport { background: #008f51; flex: 1 1 100% !important; }
        .btn-teleport:hover { background: #006b3c; }
        
        .btn-initial { background: #b05c00; flex: 1 1 100% !important; }
        .btn-initial:hover { background: #8a4800; }
        
        .btn-duplicate { background: #6b3e99; flex: 1 1 45% !important; }
        .btn-duplicate:hover { background: #522d7a; }
        
        .btn-delete { background: #c70000; flex: 1 1 45% !important; }
        .btn-delete:hover { background: #940000; }
        
        .export-controls button { background: #444; flex: 1; padding: 10px 5px; }
        .export-controls button:hover { background: #222; }

        /* Make Geoman Toolbar Larger */
        .leaflet-pm-toolbar {
            transform: scale(1.3);
            transform-origin: top left;
            margin-top: 15px !important;
            margin-left: 15px !important;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="panel-title">Shapeshifter</div>
        
        <div class="panel-section">
            <span class="panel-heading">Find a location</span>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="e.g. Cedar Point, Ohio" />
                <button id="search-btn">Go</button>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
        
        <div class="panel-section">
            <span class="panel-heading">Import shape</span>
            <input type="file" id="file-import" accept=".geojson,.json,.gpx,.kml,.kmz" style="display: none;" />
            <button id="import-btn" class="btn-full btn-import">Upload File</button>
        </div>

        <div class="panel-section">
            <span class="panel-heading">Current shapes</span>
            <input type="text" id="shape-name" placeholder="Name your shape..." />
            <button id="save-shape-btn" class="btn-full btn-action">Finish feature</button>
        </div>

        <div id="saved-list">
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.min.js"></script>
    
    <script src="https://unpkg.com/togpx@1.1.0/togpx.js"></script>
    <script src="https://unpkg.com/tokml@0.4.0/tokml.js"></script>
    
    <script src="https://unpkg.com/@tmcw/togeojson@4.4.1/dist/togeojson.umd.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

    <script>
        // 1. Initialize Map
        const canvasRenderer = L.canvas({ tolerance: 25 });
        const map = L.map('map', { renderer: canvasRenderer }).setView([33.4565, -84.4251], 16);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri',
            maxZoom: 19
        }).addTo(map);

        // 2. Configure Geoman Toolbar
        map.pm.addControls({
            position: 'topleft',
            drawMarker: false,
            drawCircleMarker: false,
            drawPolyline: true,
            drawPolygon: true,
            drawRectangle: false,
            drawCircle: false,
            drawText: false,
            editMode: true,
            dragMode: true,
            rotateMode: true,
            removalMode: true,
            cutPolygon: false
        });

        // 3. State Management
        let savedShapesData = [];
        let activeDrawnLayers = L.featureGroup().addTo(map);

        map.on('pm:create', (e) => {
            activeDrawnLayers.addLayer(e.layer);
        });

        // 4. Import Shape Logic
        document.getElementById('import-btn').addEventListener('click', () => document.getElementById('file-import').click());
        document.getElementById('file-import').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            const shapeName = file.name.split('.')[0];
            
            try {
                let geojsonData = null;

                if (ext === 'kmz') {
                    const zip = await JSZip.loadAsync(file);
                    const kmlFile = Object.values(zip.files).find(f => f.name.toLowerCase().endsWith('.kml'));
                    if (!kmlFile) throw new Error("No KML file found inside KMZ.");
                    const kmlText = await kmlFile.async("text");
                    const xml = new DOMParser().parseFromString(kmlText, "text/xml");
                    geojsonData = toGeoJSON.kml(xml);
                } else if (ext === 'kml') {
                    const text = await file.text();
                    const xml = new DOMParser().parseFromString(text, "text/xml");
                    geojsonData = toGeoJSON.kml(xml);
                } else if (ext === 'gpx') {
                    const text = await file.text();
                    const xml = new DOMParser().parseFromString(text, "text/xml");
                    geojsonData = toGeoJSON.gpx(xml);
                } else if (ext === 'geojson' || ext === 'json') {
                    const text = await file.text();
                    geojsonData = JSON.parse(text);
                } else {
                    throw new Error("Unsupported file format.");
                }

                if (!geojsonData) throw new Error("Invalid geometry extraction.");

                const importedGroup = L.geoJSON(geojsonData, {
                    style: { color: '#ff2a00', weight: 4, opacity: 1 }
                }).addTo(map);

                savedShapesData.push({
                    id: Date.now(),
                    name: shapeName,
                    layerGroup: importedGroup,
                    originalGeoJson: JSON.parse(JSON.stringify(importedGroup.toGeoJSON()))
                });

                map.fitBounds(importedGroup.getBounds(), { padding: [50, 50] });
                renderSavedList();

            } catch (err) {
                alert("Error importing file: " + err.message);
            }
            
            e.target.value = '';
        });

        // 5. "Finish Feature" Logic
        document.getElementById('save-shape-btn').addEventListener('click', function() {
            if (activeDrawnLayers.getLayers().length === 0) {
                alert("Please trace a shape on the map first using the toolbar.");
                return;
            }

            const nameInput = document.getElementById('shape-name').value.trim();
            const shapeName = nameInput !== '' ? nameInput : `Shape ${savedShapesData.length + 1}`;
            
            const geojsonData = activeDrawnLayers.toGeoJSON();
            activeDrawnLayers.clearLayers();

            const permanentGroup = L.geoJSON(geojsonData, {
                style: {
                    color: '#ff2a00',
                    weight: 4,
                    opacity: 1
                }
            }).addTo(map);

            savedShapesData.push({
                id: Date.now(),
                name: shapeName,
                layerGroup: permanentGroup,
                originalGeoJson: JSON.parse(JSON.stringify(geojsonData)) 
            });

            document.getElementById('shape-name').value = '';
            renderSavedList();
        });

        // 6. Render Saved List
        function renderSavedList() {
            const listContainer = document.getElementById('saved-list');
            listContainer.innerHTML = '';

            savedShapesData.forEach(shape => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'saved-item';
                
                itemDiv.innerHTML = `
                    <div class="saved-item-header">${shape.name}</div>
                    <div class="shape-controls">
                        <button class="btn-teleport" onclick="teleportShape(${shape.id})">Teleport shape to current view</button>
                        <button class="btn-initial" onclick="teleportToInitial(${shape.id})">Teleport to initial location</button>
                        <button class="btn-duplicate" onclick="duplicateShape(${shape.id})">Duplicate feature</button>
                        <button class="btn-delete" onclick="deleteShape(${shape.id})">Delete feature</button>
                    </div>
                    <div class="export-controls">
                        <button onclick="exportData(${shape.id}, 'geojson')">GeoJSON</button>
                        <button onclick="exportData(${shape.id}, 'gpx')">GPX</button>
                        <button onclick="exportData(${shape.id}, 'kml')">KML</button>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        // 7. Individual Shape Teleport Logic
        window.teleportShape = function(id) {
            const shape = savedShapesData.find(s => s.id === id);
            if (!shape || !shape.layerGroup) return;

            const mapCenter = map.getCenter();
            const layerCenter = shape.layerGroup.getBounds().getCenter();

            const latDiff = mapCenter.lat - layerCenter.lat;
            const lngDiff = mapCenter.lng - layerCenter.lng;

            shape.layerGroup.eachLayer(function(layer) {
                if (typeof layer.getLatLngs === 'function') {
                    const shiftCoords = (coords) => {
                        if (Array.isArray(coords[0])) return coords.map(shiftCoords);
                        return coords.map(cl => L.latLng(cl.lat + latDiff, cl.lng + lngDiff));
                    };
                    layer.setLatLngs(shiftCoords(layer.getLatLngs()));
                    layer.redraw();
                } else if (typeof layer.getLatLng === 'function') {
                    const latLng = layer.getLatLng();
                    layer.setLatLng([latLng.lat + latDiff, latLng.lng + lngDiff]);
                }
            });
        };

        // 8. Teleport to Initial Location Logic
        window.teleportToInitial = function(id) {
            const shape = savedShapesData.find(s => s.id === id);
            if (!shape || !shape.layerGroup || !shape.originalGeoJson) return;

            map.removeLayer(shape.layerGroup);

            shape.layerGroup = L.geoJSON(shape.originalGeoJson, {
                style: {
                    color: '#ff2a00',
                    weight: 4,
                    opacity: 1
                }
            }).addTo(map);

            map.fitBounds(shape.layerGroup.getBounds(), { padding: [50, 50] });
        };

        // 9. Duplicate Feature Logic
        window.duplicateShape = function(id) {
            const shape = savedShapesData.find(s => s.id === id);
            if (!shape || !shape.layerGroup) return;

            const currentGeoJson = shape.layerGroup.toGeoJSON();
            const newName = shape.name + ' (Copy)';

            const newGroup = L.geoJSON(currentGeoJson, {
                style: {
                    color: '#ff2a00',
                    weight: 4,
                    opacity: 1
                }
            }).addTo(map);

            savedShapesData.push({
                id: Date.now(),
                name: newName,
                layerGroup: newGroup,
                originalGeoJson: JSON.parse(JSON.stringify(currentGeoJson))
            });

            renderSavedList();
        };

        // 10. Delete Feature Logic
        window.deleteShape = function(id) {
            if (!confirm("Are you sure you want to delete this feature?")) return;

            const shapeIndex = savedShapesData.findIndex(s => s.id === id);
            if (shapeIndex === -1) return;

            map.removeLayer(savedShapesData[shapeIndex].layerGroup);
            savedShapesData.splice(shapeIndex, 1);
            renderSavedList();
        };

        // 11. Export Logic 
        window.exportData = function(id, format) {
            const shape = savedShapesData.find(s => s.id === id);
            if (!shape) return;

            const latestGeoJson = shape.layerGroup.toGeoJSON();
            let fileContent = '';
            let mimeType = '';
            let fileExtension = '';

            if (format === 'geojson') {
                fileContent = JSON.stringify(latestGeoJson, null, 2);
                mimeType = 'application/geo+json';
                fileExtension = 'geojson';
            } else if (format === 'gpx') {
                try {
                    fileContent = togpx(latestGeoJson);
                    mimeType = 'application/gpx+xml';
                    fileExtension = 'gpx';
                } catch (e) {
                    alert("Error converting shape to GPX. Ensure it is a valid track.");
                    return;
                }
            } else if (format === 'kml') {
                try {
                    fileContent = tokml(latestGeoJson);
                    mimeType = 'application/vnd.google-earth.kml+xml';
                    fileExtension = 'kml';
                } catch (e) {
                    alert("Error converting shape to KML.");
                    return;
                }
            }

            const blob = new Blob([fileContent], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${shape.name.replace(/\s+/g, '_')}.${fileExtension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // 12. Free Place Search Logic
        function performSearch() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const result = data[0];
                        map.setView([parseFloat(result.lat), parseFloat(result.lon)], 16);
                    } else {
                        alert("Location not found. Try being more specific.");
                    }
                })
                .catch(err => {
                    console.error("Search error:", err);
                    alert("Error searching for location.");
                });
        }

        document.getElementById('search-btn').addEventListener('click', performSearch);
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
