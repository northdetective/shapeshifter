<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shapeshifter</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #000; }
        #map { height: 100vh; width: 100vw; }
        
        /* Control Panel Styles - Scaled Up */
        #control-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 340px;
        }
        
        .panel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .panel-section { margin-bottom: 15px; }
        .panel-heading { font-weight: bold; margin-bottom: 8px; display: block; font-size: 16px; }
        
        /* Search Bar (Kept standard size as requested) */
        .search-container { display: flex; gap: 5px; }
        #search-input {
            flex-grow: 1;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px; 
        }
        
        /* Buttons - Scaled Up */
        button {
            padding: 10px 16px;
            background: #2a75d3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background: #1b5baf; }
        .btn-action { background: #ff2a00; }
        .btn-action:hover { background: #cc2200; }
        .btn-full { width: 100%; padding: 12px; margin-top: 5px; }
        
        /* Save Form Styles */
        #shape-name {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 1px solid #aaa;
            border-radius: 6px;
        }

        /* Saved Shapes List */
        #saved-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            border-top: 2px solid #eee;
            padding-top: 10px;
        }
        .saved-item {
            display: flex;
            flex-direction: column;
            background: #f4f4f4;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
        }
        .saved-item-header {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .export-controls {
            display: flex;
            gap: 5px;
        }
        .export-controls button {
            flex: 1;
            padding: 8px;
            font-size: 13px;
            background: #444;
        }
        .export-controls button:hover { background: #222; }

        /* Make Geoman Toolbar Larger */
        .leaflet-pm-toolbar {
            transform: scale(1.3);
            transform-origin: top left;
            margin-top: 15px !important;
            margin-left: 15px !important;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="panel-title">northdetective's Shapeshifter</div>
        
        <div class="panel-section">
            <span class="panel-heading">Find a Location</span>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="e.g., Cedar Point, Ohio" />
                <button id="search-btn">Go</button>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
        
        <div class="panel-section">
            <span class="panel-heading">Save Active Shapes</span>
            <input type="text" id="shape-name" placeholder="Name your shape..." />
            <button id="save-shape-btn" class="btn-full btn-action">Save to Application</button>
        </div>

        <div id="saved-list">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.min.js"></script>
    <script src="https://unpkg.com/togpx@1.1.0/togpx.js"></script>

    <script>
        // 1. Initialize Map with Canvas Renderer for hit tolerance
        const canvasRenderer = L.canvas({ tolerance: 25 });
        const map = L.map('map', { renderer: canvasRenderer }).setView([33.4565, -84.4251], 16);

        // 2. Add Satellite Basemap
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri',
            maxZoom: 19
        }).addTo(map);

        // 3. Configure Geoman Toolbar
        // Includes drawing, vertex editing, dragging, and rotating.
        map.pm.addControls({
            position: 'topleft',
            drawMarker: false,
            drawCircleMarker: false,
            drawPolyline: true,  // Trace objects as lines
            drawPolygon: true,   // Trace closed objects
            drawRectangle: false,
            drawCircle: false,
            drawText: false,
            editMode: true,      // Vertex editing
            dragMode: true,      // Move shapes
            rotateMode: true,    // Rotate shapes
            removalMode: true,   // Delete shapes
            cutPolygon: false
        });

        // App State for Saved Shapes
        let savedShapesData = [];

        // 4. Save Logic
        document.getElementById('save-shape-btn').addEventListener('click', function() {
            const nameInput = document.getElementById('shape-name').value.trim();
            const shapeName = nameInput !== '' ? nameInput : `Shape ${savedShapesData.length + 1}`;
            
            // Grab all features currently drawn on the map via Geoman
            const layers = map.pm.getGeomanLayers();
            
            if (layers.length === 0) {
                alert("Draw a shape on the map first using the toolbar on the left.");
                return;
            }

            // Convert current layers to GeoJSON
            const featureGroup = L.featureGroup(layers);
            const geojsonData = featureGroup.toGeoJSON();

            // Store in application memory
            savedShapesData.push({
                id: Date.now(),
                name: shapeName,
                geojson: geojsonData
            });

            document.getElementById('shape-name').value = ''; // clear input
            renderSavedList();
        });

        // 5. Render Saved List & Attach Export Handlers
        function renderSavedList() {
            const listContainer = document.getElementById('saved-list');
            listContainer.innerHTML = '';

            savedShapesData.forEach(shape => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'saved-item';
                
                itemDiv.innerHTML = `
                    <div class="saved-item-header">${shape.name}</div>
                    <div class="export-controls">
                        <button onclick="exportData(${shape.id}, 'geojson')">GeoJSON</button>
                        <button onclick="exportData(${shape.id}, 'gpx')">GPX</button>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        // 6. Export Logic (GeoJSON & GPX)
        window.exportData = function(id, format) {
            const shape = savedShapesData.find(s => s.id === id);
            if (!shape) return;

            let fileContent = '';
            let mimeType = '';
            let fileExtension = '';

            if (format === 'geojson') {
                fileContent = JSON.stringify(shape.geojson, null, 2);
                mimeType = 'application/geo+json';
                fileExtension = 'geojson';
            } else if (format === 'gpx') {
                // Use togpx library to convert GeoJSON to GPX XML
                try {
                    fileContent = togpx(shape.geojson);
                    mimeType = 'application/gpx+xml';
                    fileExtension = 'gpx';
                } catch (e) {
                    alert("Error converting shape to GPX. Ensure it is a valid Polyline.");
                    return;
                }
            }

            // Create invisible anchor to trigger download
            const blob = new Blob([fileContent], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${shape.name.replace(/\s+/g, '_')}.${fileExtension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // 7. Free Place Search Logic (OSM Nominatim)
        function performSearch() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const result = data[0];
                        map.setView([parseFloat(result.lat), parseFloat(result.lon)], 16);
                    } else {
                        alert("Location not found. Try being more specific.");
                    }
                })
                .catch(err => {
                    console.error("Search error:", err);
                    alert("Error searching for location.");
                });
        }

        document.getElementById('search-btn').addEventListener('click', performSearch);
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
