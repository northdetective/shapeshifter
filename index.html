<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>northdetective's Shapeshifter</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #000; }
        #map { height: 100vh; width: 100vw; }
        
        /* Control Panel Styles */
        #control-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 360px; /* Slightly wider to accommodate bigger buttons */
        }
        
        .panel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .panel-section { margin-bottom: 15px; }
        .panel-heading { font-weight: bold; margin-bottom: 8px; display: block; font-size: 16px; }
        
        /* Search Bar (Kept standard size as requested) */
        .search-container { display: flex; gap: 5px; }
        #search-input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px; 
        }
        
        /* Buttons - Scaled Up Further */
        button {
            padding: 12px 18px; /* Increased padding */
            background: #2a75d3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 17px; /* Increased text size */
            transition: background 0.2s;
        }
        button:hover { background: #1b5baf; }
        
        .btn-action { background: #ff2a00; }
        .btn-action:hover { background: #cc2200; }
        .btn-full { width: 100%; padding: 14px; margin-top: 5px; font-size: 18px; }
        
        /* Save Form Styles */
        #shape-name {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 1px solid #aaa;
            border-radius: 6px;
        }

        /* Saved Shapes List */
        #saved-list {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 15px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        .saved-item {
            display: flex;
            flex-direction: column;
            background: #f4f4f4;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
        }
        .saved-item-header {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 10px;
        }
        
        /* Individual Shape Controls */
        .shape-controls {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .export-controls {
            display: flex;
            gap: 6px;
        }
        
        .shape-controls button, .export-controls button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }
        .btn-teleport { background: #008f51; }
        .btn-teleport:hover { background: #006b3c; }
        
        .export-controls button { background: #444; }
        .export-controls button:hover { background: #222; }

        /* Make Geoman Toolbar Larger */
        .leaflet-pm-toolbar {
            transform: scale(1.3);
            transform-origin: top left;
            margin-top: 15px !important;
            margin-left: 15px !important;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="panel-title">northdetective's Shapeshifter</div>
        
        <div class="panel-section">
            <span class="panel-heading">Find a Location</span>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="e.g., Cedar Point, Ohio" />
                <button id="search-btn">Go</button>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
        
        <div class="panel-section">
            <span class="panel-heading">Active Workspace</span>
            <input type="text" id="shape-name" placeholder="Name your shape..." />
            <button id="save-shape-btn" class="btn-full btn-action">Finish Feature</button>
        </div>

        <div id="saved-list">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.min.js"></script>
    <script src="https://unpkg.com/togpx@1.1.0/togpx.js"></script>

    <script>
        // 1. Initialize Map
        const canvasRenderer = L.canvas({ tolerance: 25 });
        const map = L.map('map', { renderer: canvasRenderer }).setView([33.4565, -84.4251], 16);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri',
            maxZoom: 19
        }).addTo(map);

        // 2. Configure Geoman Toolbar
        map.pm.addControls({
            position: 'topleft',
            drawMarker: false,
            drawCircleMarker: false,
            drawPolyline: true,
            drawPolygon: true,
            drawRectangle: false,
            drawCircle: false,
            drawText: false,
            editMode: true,
            dragMode: true,
            rotateMode: true,
            removalMode: true,
            cutPolygon: false
        });

        // 3. State Management
        let savedShapesData = [];
        let activeDrawnLayers = L.featureGroup().addTo(map);

        // Track layers as they are drawn so they don't get mixed up
        map.on('pm:create', (e) => {
            activeDrawnLayers.addLayer(e.layer);
        });

        // 4. "Finish Feature" Logic
        document.getElementById('save-shape-btn').addEventListener('click', function() {
            if (activeDrawnLayers.getLayers().length === 0) {
                alert("Please trace a shape on the map first using the toolbar.");
                return;
            }

            const nameInput = document.getElementById('shape-name').value.trim();
            const shapeName = nameInput !== '' ? nameInput : `Shape ${savedShapesData.length + 1}`;
            
            // Extract the GeoJSON from the currently active drawings
            const geojsonData = activeDrawnLayers.toGeoJSON();

            // Clear the temporary active drawings from the map
            activeDrawnLayers.clearLayers();

            // Re-add the feature as a permanent, distinct group
            const permanentGroup = L.geoJSON(geojsonData, {
                style: {
                    color: '#ff2a00',
                    weight: 4,
                    opacity: 1
                }
            }).addTo(map);

            // Save to application memory
            savedShapesData.push({
                id: Date.now(),
                name: shapeName,
                layerGroup: permanentGroup
            });

            document.getElementById('shape-name').value = '';
            renderSavedList();
        });

        // 5. Render Saved List
        function renderSavedList() {
            const listContainer = document.getElementById('saved-list');
            listContainer.innerHTML = '';

            savedShapesData.forEach(shape => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'saved-item';
                
                itemDiv.innerHTML = `
                    <div class="saved-item-header">${shape.name}</div>
                    <div class="shape-controls">
                        <button class="btn-teleport" onclick="teleportShape(${shape.id})">Teleport Here</button>
                    </div>
                    <div class="export-controls">
                        <button onclick="exportData(${shape.id}, 'geojson')">Export GeoJSON</button>
                        <button onclick="exportData(${shape.id}, 'gpx')">Export GPX</button>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        // 6. Individual Shape Teleport Logic
        window.teleportShape = function(id) {
            const shape = savedShapesData.find(s => s.id === id);
            if (!shape || !shape.layerGroup) return;

            const mapCenter = map.getCenter();
            const layerCenter = shape.layerGroup.getBounds().getCenter();

            const latDiff = mapCenter.lat - layerCenter.lat;
            const lngDiff = mapCenter.lng - layerCenter.lng;

            shape.layerGroup.eachLayer(function(layer) {
                if (typeof layer.getLatLngs === 'function') {
                    const shiftCoords = (coords) => {
                        if (Array.isArray(coords[0])) return coords.map(shiftCoords);
                        return coords.map(cl => L.latLng(cl.lat + latDiff, cl.lng + lngDiff));
                    };
                    layer.setLatLngs(shiftCoords(layer.getLatLngs()));
                    layer.redraw();
                } else if (typeof layer.getLatLng === 'function') {
                    const latLng = layer.getLatLng();
                    layer.setLatLng([latLng.lat + latDiff, latLng.lng + lngDiff]);
                }
            });
        };

        // 7. Export Logic (Freshly queries the map to ensure edits/teleports are saved)
        window.exportData = function(id, format) {
            const shape = savedShapesData.find(s => s.id === id);
            if (!shape) return;

            // Generate fresh GeoJSON to capture any recent dragging or teleporting
            const latestGeoJson = shape.layerGroup.toGeoJSON();

            let fileContent = '';
            let mimeType = '';
            let fileExtension = '';

            if (format === 'geojson') {
                fileContent = JSON.stringify(latestGeoJson, null, 2);
                mimeType = 'application/geo+json';
                fileExtension = 'geojson';
            } else if (format === 'gpx') {
                try {
                    fileContent = togpx(latestGeoJson);
                    mimeType = 'application/gpx+xml';
                    fileExtension = 'gpx';
                } catch (e) {
                    alert("Error converting shape to GPX. Ensure it is a valid track.");
                    return;
                }
            }

            const blob = new Blob([fileContent], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${shape.name.replace(/\s+/g, '_')}.${fileExtension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // 8. Free Place Search Logic
        function performSearch() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const result = data[0];
                        map.setView([parseFloat(result.lat), parseFloat(result.lon)], 16);
                    } else {
                        alert("Location not found. Try being more specific.");
                    }
                })
                .catch(err => {
                    console.error("Search error:", err);
                    alert("Error searching for location.");
                });
        }

        document.getElementById('search-btn').addEventListener('click', performSearch);
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
